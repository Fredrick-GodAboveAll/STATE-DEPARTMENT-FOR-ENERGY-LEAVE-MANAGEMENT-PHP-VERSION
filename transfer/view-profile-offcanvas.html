<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>View Profile Offcanvas</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f3f4f6;
    }

    /* ── Offcanvas shell ── */
    .offcanvas {
      width: 560px !important;
      border-left: 1px solid #e5e7eb;
      box-shadow: -8px 0 32px rgba(0,0,0,0.08);
    }

    .offcanvas-header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid #f0f0f0;
    }

    .offcanvas-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #111827;
    }

    .btn-close-custom {
      background: none;
      border: none;
      font-size: 1.2rem;
      color: #6b7280;
      line-height: 1;
      padding: 0;
      cursor: pointer;
    }

    .btn-close-custom:hover { color: #111; }

    .offcanvas-body {
      padding: 1.5rem;
      overflow-y: auto;
    }

    /* ── Form layout ── */
    .form-row {
      display: grid;
      grid-template-columns: 160px 1fr;
      align-items: center;
      margin-bottom: 1rem;
      gap: 0.75rem;
    }

    .form-row.align-top {
      align-items: flex-start;
      padding-top: 0.25rem;
    }

    .form-label-custom {
      font-size: 0.875rem;
      color: #374151;
      font-weight: 500;
      text-align: right;
      white-space: nowrap;
    }

    .form-label-sub {
      font-size: 0.75rem;
      color: #9ca3af;
      font-weight: 400;
      display: block;
    }

    /* ── Inputs ── */
    .form-control-custom,
    .form-select-custom {
      width: 100%;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 0.55rem 0.85rem;
      font-size: 0.875rem;
      font-family: 'DM Sans', sans-serif;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      appearance: none;
      -webkit-appearance: none;
    }

    .form-control-custom:focus,
    .form-select-custom:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
    }

    .form-control-custom::placeholder {
      color: #9ca3af;
    }

    /* ── Select wrapper with chevron ── */
    .select-wrap {
      position: relative;
    }

    .select-wrap .chevron {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #9ca3af;
      font-size: 0.75rem;
    }

    /* ── Tag / chip inside group input ── */
    .tag-input-wrap {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.35rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      background: #fff;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: #f3f4f6;
      border-radius: 6px;
      padding: 0.2rem 0.5rem;
      font-size: 0.8rem;
      color: #374151;
      font-weight: 500;
    }

    .chip-remove {
      background: none;
      border: none;
      padding: 0;
      color: #9ca3af;
      font-size: 0.85rem;
      line-height: 1;
      cursor: pointer;
    }

    .chip-remove:hover { color: #ef4444; }

    .select-chevron-right {
      margin-left: auto;
      color: #9ca3af;
      font-size: 0.75rem;
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative;
      display: inline-block;
    }

    .avatar-wrap img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .avatar-badge {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 20px;
      height: 20px;
      background: #f97316;
      border-radius: 50%;
      border: 2px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-badge svg {
      width: 10px;
      height: 10px;
      fill: white;
    }

    /* ── Checkbox row ── */
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding-left: 160px;
      padding-left: calc(160px + 0.75rem);
    }

    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #f97316;
      cursor: pointer;
      border-radius: 4px;
    }

    .checkbox-row label {
      font-size: 0.875rem;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .info-icon {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: #e5e7eb;
      color: #6b7280;
      font-size: 0.65rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      cursor: help;
    }

    /* ── Info icon next to select ── */
    .input-with-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .input-with-info .select-wrap { flex: 1; }

    /* ── Divider ── */
    .section-divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 1.25rem 0;
    }

    /* ── Archive link ── */
    .archive-link {
      color: #f97316;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }

    .archive-link:hover { text-decoration: underline; }

    /* ── Footer ── */
    .offcanvas-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-cancel {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
    }

    .btn-cancel:hover { color: #111; }

    .btn-save {
      background: #f97316;
      border: none;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 8px;
      padding: 0.55rem 1.75rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-save:hover { background: #ea6c0a; }
  </style>
</head>
<body>

<!-- Demo trigger -->
<div class="p-4">
  <button class="btn btn-primary" 
          style="background:#f97316;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;"
          data-bs-toggle="offcanvas" data-bs-target="#profileOffcanvas">
    View Profile
  </button>
</div>

<!-- Offcanvas -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="profileOffcanvas" aria-labelledby="profileOffcanvasLabel">

  <!-- Header -->
  <div class="offcanvas-header">
    <span class="offcanvas-title" id="profileOffcanvasLabel">View Profile</span>
    <button class="btn-close-custom" data-bs-dismiss="offcanvas" aria-label="Close">&#x2715;</button>
  </div>

  <!-- Body -->
  <div class="offcanvas-body">

    <!-- Profile photo -->
    <div class="form-row align-top">
      <div class="form-label-custom">Profile photo</div>
      <div>
        <div class="avatar-wrap">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Cedric&backgroundColor=b6e3f4" alt="Cedric Diggory"/>
          <div class="avatar-badge">
            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Full name -->
    <div class="form-row">
      <div class="form-label-custom">Full name</div>
      <input type="text" class="form-control-custom" value="Cedric Diggory"/>
    </div>

    <!-- Preferred name -->
    <div class="form-row">
      <div class="form-label-custom">Preferred name</div>
      <input type="text" class="form-control-custom" value="Cedric Diggory"/>
    </div>

    <!-- Role -->
    <div class="form-row">
      <div class="form-label-custom">Role</div>
      <div class="select-wrap">
        <select class="form-select-custom">
          <option selected>Manager</option>
          <option>Member</option>
          <option>Admin</option>
        </select>
        <span class="chevron">&#8964;</span>
      </div>
    </div>

    <!-- Position -->
    <div class="form-row">
      <div class="form-label-custom">Position</div>
      <div class="select-wrap">
        <input type="text" class="form-control-custom" placeholder="Start typing to add a new position" style="padding-right:2rem;"/>
        <span class="chevron">&#8964;</span>
      </div>
    </div>

    <!-- Group -->
    <div class="form-row">
      <div class="form-label-custom">
        Group
        <span class="form-label-sub">(Optional)</span>
      </div>
      <div class="tag-input-wrap">
        <span class="chip">
          Team Dobby
          <button class="chip-remove">&#x2715;</button>
        </span>
        <span class="select-chevron-right">&#8964;</span>
      </div>
    </div>

    <!-- Assign direct manager checkbox -->
    <div class="checkbox-row">
      <input type="checkbox" id="assignManager"/>
      <label for="assignManager">
        Assign direct manager
        <span class="info-icon" title="Assign a direct manager to this member">i</span>
      </label>
    </div>

    <!-- Work schedule -->
    <div class="form-row">
      <div class="form-label-custom">Work schedule</div>
      <div class="input-with-info">
        <div class="select-wrap">
          <select class="form-select-custom" style="color:#9ca3af;">
            <option value="" selected>No specific selection. Default or group schedule will be used</option>
            <option>Morning Shift</option>
            <option>Evening Shift</option>
          </select>
          <span class="chevron">&#8964;</span>
        </div>
        <span class="info-icon" title="Work schedule info">i</span>
      </div>
    </div>

    <!-- Holiday calendar -->
    <div class="form-row">
      <div class="form-label-custom">Holiday calendar</div>
      <div class="input-with-info">
        <div class="tag-input-wrap">
          <span class="chip">
            Hogwarts Calendar
            <button class="chip-remove">&#x2715;</button>
          </span>
          <span class="select-chevron-right">&#8964;</span>
        </div>
        <span class="info-icon" title="Holiday calendar info">i</span>
      </div>
    </div>

    <hr class="section-divider"/>

    <!-- Archive -->
    <a class="archive-link">Archive member</a>

  </div>

  <!-- Footer -->
  <div class="offcanvas-footer">
    <div></div>
    <div class="d-flex align-items-center gap-3">
      <button class="btn-cancel" data-bs-dismiss="offcanvas">Cancel</button>
      <button class="btn-save">Save</button>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script>
  // Auto-open for demo
  window.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('profileOffcanvas');
    const oc = new bootstrap.Offcanvas(el);
    oc.show();
  });
</script>
</body>
</html>
